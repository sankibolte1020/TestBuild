name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5        # v4 → v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5      # v4 → v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.1.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v6   # v4 → v6
        with:
          name: spy-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
